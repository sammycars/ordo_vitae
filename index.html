<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordo_Vitae</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div id="app">
        <!-- Login View -->
        <div id="login-view" class="view">
            <div class="login-container">
                <h1>Ordo_Vitae</h1>
                <p class="tagline">Order your life.</p>
                <div class="auth-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-input">
                            <input type="password" id="password" placeholder="Password">
                            <button type="button" id="toggle-password" class="btn-toggle">[ Show ]</button>
                        </div>
                    </div>
                    <div class="button-group">
                        <button id="login-btn" class="btn">[ Login ]</button>
                        <button id="signup-btn" class="btn btn-secondary">[ Sign Up ]</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dashboard View (hidden until logged in) -->
        <div id="dashboard-view" class="view hidden">
            <header class="header">
                <div class="header-main">
                    <h1 class="logo">Ordo_Vitae <span class="version">v0.1</span></h1>
                    <div id="quote-container" class="quote-container">
                        <span id="quote-text" class="quote-text"></span>
                    </div>
                </div>
                <nav class="nav">
                    <a href="#" data-view="visions" class="nav-link">[ Visions ]</a>
                    <a href="#" data-view="goals" class="nav-link">[ Goals ]</a>
                    <a href="#" data-view="actions" class="nav-link">[ Actions ]</a>
                    <a href="#" data-view="quarters" class="nav-link">[ Quarters ]</a>
                    <a href="#" data-view="weeks" class="nav-link">[ Weeks ]</a>
                    <a href="#" data-view="days" class="nav-link">[ Days ]</a>
                    <a href="#" data-view="habits" class="nav-link">[ Habits ]</a>
                    <a href="#" data-view="dev" class="nav-link dev-link">[ Dev ]</a>
                    <a href="#" id="logout-btn" class="nav-link">[ Logout ]</a>
                </nav>
            </header>
            <main class="content">
                <!-- Content loaded dynamically -->
            </main>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    
    <!-- Views -->
    <script src="js/views/visions.js"></script>
    <script src="js/views/goals.js"></script>
    <script src="js/views/actions.js"></script>
    <script src="js/views/quarters.js"></script>
    <script src="js/views/weeks.js"></script>
    <script src="js/views/days.js"></script>
    <script src="js/views/habits.js"></script>
    <script src="js/views/dev.js"></script>
    
    <!-- Components -->
    <script src="js/components/diagnostics.js"></script>
    <script src="js/components/quote-rotator.js"></script>
    <script src="js/components/object-color.js"></script>
    <script src="js/components/saveable-textarea.js"></script>
    
    <script src="js/app.js"></script>
</body>
</html>
